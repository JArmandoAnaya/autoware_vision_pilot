name: Build VisionPilot Container

env:
  DEFAULT_ONNXRUNTIME_VERSION: "1.22.0"

on:
  workflow_dispatch:
    inputs:
      onnxruntime-version:
        description: "ONNX Runtime version"
        required: true
        default: "1.22.0"
  push:
    branches:
      - main
    paths:
      - 'Models/**'
      - 'VisionPilot/middleware_recipes/**'
      - 'VisionPilot/software_defined_vehicle/OpenADKit/**'
      - '.github/workflows/build-visionpilot-container.yaml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        platform: [amd64, arm64]
        include:
          - platform: amd64
            runner: ubuntu-24.04
            arch-platform: linux/amd64
            arch: x64
          - platform: arm64
            runner: ubuntu-24.04-arm
            arch-platform: linux/arm64
            arch: aarch64

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build visionpilot-devel image
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ matrix.arch-platform }}
          context: .
          file: ./VisionPilot/software_defined_vehicle/OpenADKit/Docker/Dockerfile
          target: devel
          build-args: |
            ARCH=${{ matrix.arch }}
            ONNXRUNTIME_VERSION=${{ inputs.onnxruntime-version || env.DEFAULT_ONNXRUNTIME_VERSION }}
          push: true
          provenance: false
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/visionpilot-devel:${{ github.sha }}-${{ matrix.platform }}
            ghcr.io/${{ github.repository_owner }}/visionpilot-devel:${{ steps.date.outputs.date }}-${{ matrix.platform }}

      - name: Build visionpilot runtime image
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ matrix.arch-platform }}
          context: .
          file: ./VisionPilot/software_defined_vehicle/OpenADKit/Docker/Dockerfile
          target: runtime
          build-args: |
            ARCH=${{ matrix.arch }}
            ONNXRUNTIME_VERSION=${{ inputs.onnxruntime-version || env.DEFAULT_ONNXRUNTIME_VERSION }}
          push: true
          provenance: false
          cache-from: type=gha,scope=${{ matrix.platform }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/visionpilot:${{ github.sha }}-${{ matrix.platform }}
            ghcr.io/${{ github.repository_owner }}/visionpilot:${{ steps.date.outputs.date }}-${{ matrix.platform }}

  manifest:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Create and push multi-arch manifests
        run: |
          # Moving tags (date, latest) are only published from main
          tags="${{ github.sha }}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            tags="$tags ${{ steps.date.outputs.date }} latest"
          fi
          for image in visionpilot visionpilot-devel; do
            for tag in $tags; do
              docker buildx imagetools create \
                --tag "ghcr.io/${{ github.repository_owner }}/${image}:${tag}" \
                "ghcr.io/${{ github.repository_owner }}/${image}:${{ github.sha }}-amd64" \
                "ghcr.io/${{ github.repository_owner }}/${image}:${{ github.sha }}-arm64"
            done
          done
