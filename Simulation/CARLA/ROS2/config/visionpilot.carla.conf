# VisionPilot configuration — CARLA UE5 0.10.0 (Shipping) drive.
#
# Install over the canonical config the binary reads (it loads config/vision_pilot.conf
# by fixed path; --config is not honored by the app loader):
#   cp config/carla/vision_pilot.conf      config/vision_pilot.conf
#   cp config/carla/vision_pilot_ros2.conf config/vision_pilot_ros2.conf
# Requires a build with -DENABLE_ROS2_INTERFACE=ON and the CARLA ground homography
# baked in (-DVISIONPILOT_GROUND_HOMOGRAPHY=Simulation/CARLA/ROS2/config/H_carla.yaml).
# Full bring-up: Simulation/CARLA/ROS2/README.md.

# ─── Input source ────────────────────────────────────────────────────────────
# CARLA publishes the camera natively over --ros2; topic set in vision_pilot_ros2.conf.
source.mode             = ros2

# ─── ONNX models ─────────────────────────────────────────────────────────────
# GPU inference for a live drive.
engine.provider     = cuda
engine.device_id    = 0
engine.cache_dir    = ~/.cache/vp_cuda
engine.workspace_gb = 1.0

model.precision    = fp32

# ─── Vehicle ─────────────────────────────────────────────────────────────────
speed_limit      = 2.0    # m/s
Lf               = 1.335  # CARLA lincoln.mkz front axle to CoG (m)

