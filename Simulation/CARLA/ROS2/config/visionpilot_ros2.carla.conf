# VisionPilot ROS2 topics — CARLA UE5 0.10.0 (Shipping) drive.
#
# Install over config/vision_pilot_ros2.conf (see config/carla/vision_pilot.conf header).
# Camera in: CARLA-native sensor.camera.rgb published as /carla/hero/<id>/image.
# Actuation: Float64 /vehicle/{steering,throttle}_cmd -> visionpilot_carla_bridge
#            (carla_control_relay) -> carla_msgs/CarlaEgoVehicleControl.
# Ego speed: /vehicle/speed published by ego_speed_publisher (CARLA PythonAPI) or the
#            ego_speed_republisher node.

source.input_camera_topic   = /carla/hero/main_cam/image

vehicle_speed_topic         = /vehicle/speed
vehicle_steering_topic      = /vehicle/steering_cmd
vehicle_acceleration_topic  = /vehicle/throttle_cmd
